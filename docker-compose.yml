name: via-fluvial-lp

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: via-fluvial-lp:local
    container_name: via-fluvial-lp-web
    ports:
      - "8081:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-dev:
    image: node:20-alpine
    container_name: via-fluvial-lp-web-dev
    working_dir: /app
    ports:
      - "8081:8081"
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 8081"
    volumes:
      - ./:/app
      - web-dev-node-modules:/app/node_modules
    restart: unless-stopped
    profiles:
      - dev

volumes:
  web-dev-node-modules:
