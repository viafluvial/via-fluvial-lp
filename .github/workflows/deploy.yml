name: Deploy Production (Application Cluster)

on:
  workflow_dispatch:
    inputs:
      apply_dns:
        description: "Aplicar Terraform DNS"
        required: true
        type: boolean
        default: true
      deploy_stack:
        description: "Deploy da stack no Portainer via Ansible"
        required: true
        type: boolean
        default: true

env:
  NODE_VERSION: "20"
  REGISTRY: docker.io
  DEFAULT_DOCKERHUB_NAMESPACE: viafluvial
  TF_DIR: deployment/terraform/dns
  ANSIBLE_DIR: deployment/ansible
  DEFAULT_APPLICATION_CLUSTER_IP: "8.232.27.179"
  DEFAULT_DNS_PROJECT_ID: "vfa-dns-core"
  DEFAULT_DNS_ZONE_NAME: "zona-dns-viafluvial-com-br"
  DEFAULT_GCP_WIF_PROVIDER: "projects/365800925236/locations/global/workloadIdentityPools/via-fluvial-pool/providers/github-provider"
  DEFAULT_GCP_WIF_SERVICE_ACCOUNT: "via-fluvial-tf@infra-control-automation.iam.gserviceaccount.com"

jobs:
  build-and-push-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_ref: ${{ steps.image.outputs.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image reference
        id: image
        run: |
          REPO_NAME="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          NAMESPACE="${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || env.DEFAULT_DOCKERHUB_NAMESPACE }}"
          echo "ref=${{ env.REGISTRY }}/${NAMESPACE}/${REPO_NAME}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${{ env.REGISTRY }}/${NAMESPACE}/${REPO_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.latest_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-dns:
    name: Terraform DNS Apply
    needs: build-and-push-image
    if: inputs.apply_dns
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate GCP (Service Account JSON secret)
        if: secrets.GCP_SA_KEY_JSON != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Configure local SA credentials file (fallback)
        if: secrets.GCP_SA_KEY_JSON == ''
        run: |
          if [[ -f credentials/sa.json ]]; then
            echo "GOOGLE_APPLICATION_CREDENTIALS=${GITHUB_WORKSPACE}/credentials/sa.json" >> "$GITHUB_ENV"
            echo "Using credentials file from repository: credentials/sa.json"
          fi

      - name: Authenticate GCP (Workload Identity fallback)
        if: secrets.GCP_SA_KEY_JSON == '' && env.GOOGLE_APPLICATION_CREDENTIALS == ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER != '' && secrets.GCP_WIF_PROVIDER || env.DEFAULT_GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT != '' && secrets.GCP_WIF_SERVICE_ACCOUNT || env.DEFAULT_GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.9

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false \
            -var="dns_project_id=${{ secrets.GCP_DNS_PROJECT_ID != '' && secrets.GCP_DNS_PROJECT_ID || env.DEFAULT_DNS_PROJECT_ID }}" \
            -var="dns_zone_name=${{ secrets.GCP_DNS_ZONE_NAME != '' && secrets.GCP_DNS_ZONE_NAME || env.DEFAULT_DNS_ZONE_NAME }}" \
            -var="application_lb_ip=${{ vars.APPLICATION_CLUSTER_IP || env.DEFAULT_APPLICATION_CLUSTER_IP }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

  deploy-stack:
    name: Deploy Stack via Ansible
    needs:
      - build-and-push-image
      - terraform-dns
    if: always() && (needs.build-and-push-image.result == 'success') && (needs.terraform-dns.result == 'success' || needs.terraform-dns.result == 'skipped') && inputs.deploy_stack
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.5

      - name: Configure SSH key for Ansible
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [[ -n "$SSH_PRIVATE_KEY" ]]; then
            printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/gcp-swarm-vfa
          elif [[ -f modelos/via-fluvial-cluster-warm.zip ]]; then
            unzip -p modelos/via-fluvial-cluster-warm.zip 'via-fluvial-cluster-warm/~/.ssh/gcp-swarm-vfa' > ~/.ssh/gcp-swarm-vfa
          else
            echo "ANSIBLE_SSH_PRIVATE_KEY not provided and fallback key not found in modelos zip."
            exit 1
          fi
          chmod 600 ~/.ssh/gcp-swarm-vfa

      - name: Add manager host to known_hosts
        run: ssh-keyscan -H ${{ vars.APPLICATION_CLUSTER_IP || env.DEFAULT_APPLICATION_CLUSTER_IP }} >> ~/.ssh/known_hosts

      - name: Run Ansible stack deploy
        env:
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_APPLICATION_API_KEY }}
        run: |
          ansible-playbook \
            -i ${{ env.ANSIBLE_DIR }}/inventories/application-prd.ini \
            ${{ env.ANSIBLE_DIR }}/playbooks/deploy-portainer-stack.yml \
            -e "app_image=${{ needs.build-and-push-image.outputs.image_ref }}" \
            -e "portainer_api_key=$PORTAINER_API_KEY"
